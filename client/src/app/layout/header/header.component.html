<header class="shadow-md p-3 max-h-20 fixed top-0 w-full z-50 bg-white">
  <div class="flex align-middle items-center justify-between max-w-screen-2xl mx-auto">
    <img routerLink="/" src="/images/logo.png" title="app logo" alt="app logo" class="max-h-16">
    <nav class="flex gap-3 my-2 uppercase text-2xl">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="/shop" routerLinkActive="active" >Shop</a>
      <a routerLink="/contact" routerLinkActive="active" >Contact</a>
      <a routerLink="/test-error" routerLinkActive="active" >Errors</a>
    </nav>
    <div class="flex gap-3 align-middle">
      <a routerLink="/cart" routerLinkActive="active" 
      matBadge="{{ cartService.itemCount() }}" matBadgeSize="large" class="custom-badge mt-2 mr-2">
        <mat-icon>shopping_cart</mat-icon>
      </a>
      <button mat-stroked-button routerLink="/login">Login</button>
      <button mat-stroked-button routerLink="/register">Register</button>
    </div>
  </div>
</header>
@if (busyService.loading){
<mat-progress-bar mode="indeterminate" class="fiixed top-20 z-50" color="accent"></mat-progress-bar>
}
