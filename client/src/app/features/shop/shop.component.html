@if(productList) {

  <div class="flex flex-col gap-3">
    <div class="flex justify-between">
      <mat-paginator
      (page)="handlePageEvent($event)"
      [length]="productList.count"
      [pageSize]="shopParams.pageSize"
      [showFirstLastButtons]="true"
      [pageSizeOptions]="pageSiezeOptions"
      [pageIndex]="shopParams.pageNumber - 1"
      aria-label="Select Page">
      </mat-paginator>
      <form #searchForm="ngForm" (ngSubmit)="onSearchChange()"
      class="relative flex items-center w-full max-w-md mx-4">
      <input type="search"
      class="block w-full p-4 text-sm text-gray-900 border vorder-gray-300 rounded-lg"
      placeholder="Search products..."
      name = "search"
      [(ngModel)]="shopParams.search"/>
      <button class="match-input-height" mat-icon-button type="submit"
      class="absolute inset-y-0 right-8 top-2 flex items-center pl-3">
      <mat-icon>search</mat-icon>
      </button>
      </form>
      <div class="flex gap-3">
        <button class="match-input-height" mat-stroked-button (click)="openFilterDialog()">
          <mat-icon>filter_list</mat-icon>
          Filtros
        </button>
        <button class="match-input-height" mat-stroked-button [matMenuTriggerFor]="sortMenu">
           <mat-icon>swap_vert</mat-icon>
          Ordenar
        </button>
      </div>
    </div>
    <div class="grid grid-cols-5 gap-4">
    @for(product of productList?.data; track product.id) {
      <app-product-item [product]="product"></app-product-item>
    }
    </div>
  </div>

  <mat-menu #sortMenu="matMenu">
  <mat-selection-list [multiple]="false" (selectionChange)="onSortChange($event)">
    @for(sort of sortOptions; track $index) {
      <mat-list-option [value]="sort.value" [selected]="shopParams.sort === sort.value">
        {{sort.viewValue}}
      </mat-list-option>
    }
  </mat-selection-list>
  </mat-menu>
}
