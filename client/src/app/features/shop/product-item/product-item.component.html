@if(product){
  <mat-card appearance="raised">
      <img src="{{product.pictureUrl}}" alt="{{product.name}}" class="h-48 w-full object-cover">
      <!-- <mat-card-header>
        <mat-card-title>{{product.name}}</mat-card-title>
      </mat-card-header> -->
      <mat-card-content class="mt-2">
        <h2 class="text-sm font-semibold uppercase">{{product.name}}</h2>
        <p class="font-light">Price: ${{product.price | currency }}</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-stroked-button class="w-full">
          <mat-icon>add_shopping_cart</mat-icon>Add to Cart
        </button>
      </mat-card-actions>
    </mat-card>
}
