<mat-card class="max-w-lg mx-auto mt-6 p-8 bg-white">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-semibold text-primary">Login</h1>
    </div>
    <mat-form-field appearance="outline" class="w-full mb-4">
      <mat-label>E-mail</mat-label>
      <input matInput formControlName="email" type="email" placeholder="Digite seu email" required/>
    </mat-form-field>
    <mat-form-field appearance="outline" class="w-full mb-4">
      <mat-label>Password</mat-label>
      <input matInput formControlName="password" type="password" placeholder="Digite sua senha" required/>
    </mat-form-field>
    <button mat-flat-button color="primary" type="submit" class="w-full py-2">Login</button>
  </form>
</mat-card>
